<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Diagram</title>
<script src="https://unpkg.com/@antv/x6@2.19.2/dist/index.js"></script>
<script src="https://unpkg.com/@antv/x6-plugin-selection@2.2.2/dist/index.js"></script>
<script src="https://unpkg.com/@antv/x6-plugin-history@2.2.4/dist/index.js"></script>
<script src="https://unpkg.com/@antv/x6-plugin-snapline@2.1.7/dist/index.js"></script>
<script src="https://unpkg.com/@antv/x6-plugin-export@2.1.6/dist/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh;width:100vw}
.toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 12px;z-index:100;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar .title{font-size:15px;font-weight:600;color:#1a1a1a;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar button{padding:5px 10px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#555;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.toolbar button:hover{border-color:#4096ff;color:#4096ff;background:#f0f5ff}
.toolbar button:disabled{opacity:.4;cursor:not-allowed}
.toolbar .sep{width:1px;height:24px;background:#e8e8e8;flex-shrink:0}
.status{position:fixed;top:56px;right:16px;padding:4px 10px;border-radius:12px;font-size:11px;z-index:99;transition:all .3s}
.status.connected{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status.disconnected{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}
#container{position:absolute;top:48px;left:0;right:0;bottom:0}
.node-panel{position:fixed;top:56px;left:8px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:8px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:4px;width:52px}
.node-panel .panel-item{width:36px;height:36px;border:1px solid #e8e8e8;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.node-panel .panel-item:hover{border-color:#4096ff;background:#f0f5ff}
.node-panel .panel-item .shape-icon{width:24px;height:24px}
.context-menu{display:none;position:fixed;background:#fff;border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:200;min-width:150px;overflow:hidden;padding:4px 0}
.context-menu.show{display:block}
.context-menu button{display:block;width:100%;padding:8px 16px;border:none;background:none;text-align:left;font-size:12px;color:#555;cursor:pointer;white-space:nowrap}
.context-menu button:hover{background:#f0f5ff;color:#4096ff}
.context-menu .menu-sep{height:1px;background:#e8e8e8;margin:4px 0}
.dropdown{position:relative;display:inline-block}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:200;min-width:140px;overflow:hidden}
.dropdown-menu.show{display:block}
.dropdown-menu button{display:block;width:100%;padding:8px 14px;border:none;background:none;text-align:left;font-size:12px;color:#555;cursor:pointer;white-space:nowrap}
.dropdown-menu button:hover{background:#f0f5ff;color:#4096ff}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.zoom-indicator{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:4px 10px;font-size:11px;color:#8c8c8c;z-index:99}
.inline-editor-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.15);z-index:300;display:flex;align-items:center;justify-content:center}
.inline-editor{background:#fff;border:1px solid #d9d9d9;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:16px;min-width:280px;display:flex;flex-direction:column;gap:10px}
.inline-editor label{font-size:13px;font-weight:500;color:#1a1a1a}
.inline-editor input{padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none;transition:border-color .2s}
.inline-editor input:focus{border-color:#4096ff;box-shadow:0 0 0 2px rgba(64,150,255,.15)}
.inline-editor .editor-btns{display:flex;gap:8px;justify-content:flex-end}
.inline-editor .editor-btns button{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #d9d9d9;background:#fff;color:#555;transition:all .15s}
.inline-editor .editor-btns button.primary{background:#4096ff;color:#fff;border-color:#4096ff}
.inline-editor .editor-btns button.primary:hover{background:#1677ff}
.inline-editor .editor-btns button:hover{border-color:#4096ff}
</style>
</head>
<body>
<div class="toolbar">
  <span class="title" id="diagramTitle">Interactive Diagram</span>
  <div class="sep"></div>
  <button id="btnUndo" onclick="doUndo()" disabled>↩ 撤销</button>
  <button id="btnRedo" onclick="doRedo()" disabled>↪ 重做</button>
  <div class="sep"></div>
  <button onclick="zoomIn()">+ 放大</button>
  <button onclick="zoomOut()">- 缩小</button>
  <button onclick="resetView()">重置视图</button>
  <button onclick="fitView()">适应画布</button>
  <button onclick="autoLayout()">自动布局</button>
  <div class="sep"></div>
  <button onclick="exportPNG()">导出 PNG</button>
  <button onclick="exportSVG()">导出 SVG</button>
  <button onclick="exportJSON()">导出 JSON</button>
  <div class="dropdown">
    <button onclick="toggleDrawioMenu(event)">导出 Draw.io ▾</button>
    <div class="dropdown-menu" id="drawioMenu">
      <button onclick="drawioDownload()">下载文件</button>
      <button onclick="drawioCopy()">复制 XML</button>
    </div>
  </div>
</div>
<div class="status disconnected" id="status">断开连接</div>
<div class="node-panel" id="nodePanel">
  <div class="panel-item" data-type="process" title="处理"><svg class="shape-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3" fill="none" stroke="#4096ff" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="decision" title="判断"><svg class="shape-icon" viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12" fill="none" stroke="#faad14" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="terminal" title="开始"><svg class="shape-icon" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="7" fill="none" stroke="#52c41a" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="terminal-end" title="结束"><svg class="shape-icon" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="7" fill="none" stroke="#ff4d4f" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="service" title="服务"><svg class="shape-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="6" fill="none" stroke="#722ed1" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="database" title="数据库"><svg class="shape-icon" viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="9" ry="4" fill="none" stroke="#13c2c2" stroke-width="2"/><path d="M3 6v12c0 2.2 4 4 9 4s9-1.8 9-4V6" fill="none" stroke="#13c2c2" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="success" title="成功"><svg class="shape-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3" fill="none" stroke="#52c41a" stroke-width="2"/><polyline points="7,12 10,15 17,9" fill="none" stroke="#52c41a" stroke-width="2"/></svg></div>
  <div class="panel-item" data-type="error" title="失败"><svg class="shape-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="3" fill="none" stroke="#ff4d4f" stroke-width="2"/><line x1="9" y1="9" x2="15" y2="15" stroke="#ff4d4f" stroke-width="2"/><line x1="15" y1="9" x2="9" y2="15" stroke="#ff4d4f" stroke-width="2"/></svg></div>
</div>
<div class="context-menu" id="contextMenu">
  <button onclick="cmEdit()">编辑标签</button>
  <button onclick="cmDuplicate()">复制节点</button>
  <div class="menu-sep"></div>
  <button onclick="cmDelete()" style="color:#ff4d4f">删除</button>
</div>
<div id="container"></div>
<div class="zoom-indicator" id="zoomIndicator">100%</div>

<script>
// ============================================================
// State & Config
// ============================================================
const state = { direction: 'TB', _isRestoring: false };
let graph = null;
let contextTarget = null;
let clipboard = [];
const PNG_EXPORT_DEFAULT_RATIO = Math.max(window.devicePixelRatio || 1, 2);

const NODE_TYPES = {
  'process':      { width: 120, height: 50, body: { fill: '#fff', stroke: '#4096ff', strokeWidth: 2, rx: 8, ry: 8 }, labelFill: '#1a1a1a' },
  'decision':     { width: 130, height: 70, body: { fill: '#fff7e6', stroke: '#faad14', strokeWidth: 2, rx: 8, ry: 8 }, labelFill: '#1a1a1a' },
  'terminal':     { width: 100, height: 50, body: { fill: '#52c41a', stroke: '#389e0d', strokeWidth: 0, rx: 25, ry: 25 }, labelFill: '#fff' },
  'terminal-end': { width: 100, height: 50, body: { fill: '#ff4d4f', stroke: '#cf1322', strokeWidth: 0, rx: 25, ry: 25 }, labelFill: '#fff' },
  'service':      { width: 120, height: 50, body: { fill: '#fff', stroke: '#722ed1', strokeWidth: 2, rx: 12, ry: 12 }, labelFill: '#1a1a1a' },
  'database':     { width: 120, height: 50, body: { fill: '#fff', stroke: '#13c2c2', strokeWidth: 2, rx: 4, ry: 4 }, labelFill: '#1a1a1a' },
  'success':      { width: 120, height: 50, body: { fill: '#fff', stroke: '#52c41a', strokeWidth: 2, rx: 8, ry: 8 }, labelFill: '#1a1a1a' },
  'error':        { width: 120, height: 50, body: { fill: '#fff', stroke: '#ff4d4f', strokeWidth: 2, rx: 8, ry: 8 }, labelFill: '#1a1a1a' },
};

const DEFAULT_LABELS = {
  'process': '处理', 'decision': '判断?', 'terminal': '开始', 'terminal-end': '结束',
  'service': '服务', 'database': '数据库', 'success': '成功', 'error': '失败',
};

// ============================================================
// Build node config for X6 addNode
// ============================================================
function buildNodeConfig(id, type, label, x, y) {
  const t = NODE_TYPES[type] || NODE_TYPES['process'];
  let shape = 'rect';
  if (type === 'decision') shape = 'polygon';
  else if (type === 'terminal' || type === 'terminal-end') shape = 'ellipse';

  const config = {
    id: id,
    shape: shape,
    x: x || 0,
    y: y || 0,
    width: t.width,
    height: t.height,
    label: label || '',
    attrs: {
      body: { ...t.body },
      label: { fontSize: 13, fill: t.labelFill, textWrap: { width: t.width - 20 } },
    },
    ports: {
      groups: {
        top:    { position: 'top',    attrs: { circle: { r: 4, magnet: true, stroke: '#ccc', strokeWidth: 1, fill: '#fff' } } },
        bottom: { position: 'bottom', attrs: { circle: { r: 4, magnet: true, stroke: '#ccc', strokeWidth: 1, fill: '#fff' } } },
        left:   { position: 'left',   attrs: { circle: { r: 4, magnet: true, stroke: '#ccc', strokeWidth: 1, fill: '#fff' } } },
        right:  { position: 'right',  attrs: { circle: { r: 4, magnet: true, stroke: '#ccc', strokeWidth: 1, fill: '#fff' } } },
      },
      items: [
        { group: 'top', id: 'pt' },
        { group: 'bottom', id: 'pb' },
        { group: 'left', id: 'pl' },
        { group: 'right', id: 'pr' },
      ],
    },
    data: { diagramType: type },
  };
  if (type === 'decision') {
    config.attrs.body.refPoints = '0.5,0 1,0.5 0.5,1 0,0.5';
  }
  if (type === 'database') {
    // Custom cylinder markup for database
    config.shape = 'rect';
    config.markup = [
      { tagName: 'rect', selector: 'body' },
      { tagName: 'rect', selector: 'topBar' },
      { tagName: 'text', selector: 'label' },
    ];
    config.attrs.topBar = {
      refWidth: '100%', height: 8, fill: '#13c2c2', stroke: '#13c2c2', rx: 4, ry: 4,
    };
    config.attrs.body.rx = 4;
    config.attrs.body.ry = 4;
  }
  return config;
}

// ============================================================
// Init Graph
// ============================================================
function initGraph() {
  const container = document.getElementById('container');
  console.log('[diagram] initGraph, container size:', container.offsetWidth, container.offsetHeight);

  graph = new X6.Graph({
    container: container,
    width: container.offsetWidth,
    height: container.offsetHeight,
    background: { color: '#f0f2f5' },
    grid: { visible: true, type: 'dot', size: 15, args: { color: '#ddd' } },
    panning: { enabled: true },
    mousewheel: { enabled: true, zoomAtMousePosition: true, minScale: 0.2, maxScale: 3, factor: 1.02 },
    connecting: {
      router: { name: 'manhattan', args: { padding: 30, step: 15 } },
      connector: { name: 'rounded', args: { radius: 8 } },
      snap: { radius: 30 },
      allowBlank: false,
      allowLoop: false,
      highlight: true,
      createEdge() {
        return graph.createEdge({
          attrs: { line: { stroke: '#8c8c8c', strokeWidth: 2, targetMarker: { name: 'classic', size: 8 } } },
        });
      },
      validateConnection({ sourceCell, targetCell }) {
        return sourceCell !== targetCell;
      },
    },
    highlighting: {
      magnetAvailable: { name: 'stroke', args: { padding: 4, attrs: { strokeWidth: 2, stroke: '#47C769' } } },
      magnetAdsorbed: { name: 'stroke', args: { padding: 4, attrs: { strokeWidth: 4, stroke: '#47C769' } } },
    },
  });

  console.log('[diagram] graph created');

  // Plugins
  graph.use(new X6PluginSelection.Selection({ enabled: true, multiple: true, rubberband: true, modifiers: 'shift', showNodeSelectionBox: true, showEdgeSelectionBox: true }));
  graph.use(new X6PluginHistory.History({ enabled: true }));
  graph.use(new X6PluginSnapline.Snapline({ enabled: true }));
  graph.use(new X6PluginExport.Export());
  console.log('[diagram] plugins loaded');

  // Port hover effect
  graph.on('node:mouseenter', ({ node }) => {
    const ports = node.getPorts();
    ports.forEach(p => { node.setPortProp(p.id, 'attrs/circle/stroke', '#4096ff'); node.setPortProp(p.id, 'attrs/circle/r', 5); });
  });
  graph.on('node:mouseleave', ({ node }) => {
    const ports = node.getPorts();
    ports.forEach(p => { node.setPortProp(p.id, 'attrs/circle/stroke', '#ccc'); node.setPortProp(p.id, 'attrs/circle/r', 4); });
  });

  // Edge click to select + highlight
  graph.on('edge:click', ({ edge }) => { graph.cleanSelection(); graph.select(edge); });
  graph.on('edge:selected', ({ edge }) => {
    edge._origStroke = edge.attr('line/stroke');
    edge._origWidth = edge.attr('line/strokeWidth');
    edge.attr('line/strokeWidth', 3);
  });
  graph.on('edge:unselected', ({ edge }) => {
    edge.attr('line/strokeWidth', edge._origWidth || 2);
  });

  // Double-click edit node
  graph.on('node:dblclick', ({ node }) => {
    const text = node.attr('label/text') || '';
    showInlineEditor('编辑节点标签', text, (newText) => { node.attr('label/text', newText); });
  });

  // Double-click edit edge
  graph.on('edge:dblclick', ({ edge }) => {
    const labels = edge.getLabels();
    const text = labels.length > 0 ? (labels[0].attrs?.label?.text || '') : '';
    showInlineEditor('编辑连线标签', text, (newText) => {
      if (labels.length > 0) edge.setLabelAt(0, { attrs: { label: { text: newText } } });
      else edge.appendLabel({ attrs: { label: { text: newText } } });
    });
  });

  // Right-click context menu
  graph.on('node:contextmenu', ({ node, e }) => {
    e.preventDefault();
    contextTarget = node;
    showContextMenu(e.clientX, e.clientY);
  });
  graph.on('blank:click', hideContextMenu);
  graph.on('blank:contextmenu', ({ e }) => { e.preventDefault(); hideContextMenu(); });

  // Keyboard shortcuts (native, since bindKey requires keyboard plugin)
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const mod = e.ctrlKey || e.metaKey;
    if (e.key === 'Delete' || e.key === 'Backspace') { deleteSelected(); e.preventDefault(); }
    else if (mod && e.key === 'z' && !e.shiftKey) { doUndo(); e.preventDefault(); }
    else if (mod && e.key === 'z' && e.shiftKey) { doRedo(); e.preventDefault(); }
    else if (mod && e.key === 'y') { doRedo(); e.preventDefault(); }
    else if (mod && e.key === 'a') { graph.select(graph.getCells()); e.preventDefault(); }
  });

  // Save positions after user drags nodes
  let _dragSaveTimer = null;
  graph.on('node:moved', () => {
    clearTimeout(_dragSaveTimer);
    _dragSaveTimer = setTimeout(() => saveNodePositions(), 500);
  });

  // Undo/redo button state
  graph.on('history:change', updateUndoRedo);

  // Zoom indicator
  graph.on('scale', () => {
    document.getElementById('zoomIndicator').textContent = Math.round(graph.zoom() * 100) + '%';
  });

  // Resize
  window.addEventListener('resize', () => { graph.resize(container.offsetWidth, container.offsetHeight); });

  console.log('[diagram] event bindigs done');
}

function deleteSelected() {
  const cells = graph.getSelectedCells();
  if (cells.length > 0) graph.removeCells(cells);
}

// ============================================================
// Undo / Redo
// ============================================================
function doUndo() { if (graph && graph.canUndo()) graph.undo(); }
function doRedo() { if (graph && graph.canRedo()) graph.redo(); }
function updateUndoRedo() {
  document.getElementById('btnUndo').disabled = !graph.canUndo();
  document.getElementById('btnRedo').disabled = !graph.canRedo();
}

// ============================================================
// Zoom
// ============================================================
function zoomIn() { graph.zoom(0.15); }
function zoomOut() { graph.zoom(-0.15); }
function resetView() { graph.zoomTo(1); graph.centerContent(); }
function fitView() { if (graph.getNodes().length > 0) graph.zoomToFit({ padding: 60, maxScale: 1.5 }); }

// ============================================================
// Auto layout with dagre
// ============================================================
function autoLayout() {
  const nodes = graph.getNodes();
  const edges = graph.getEdges();
  if (nodes.length === 0) return;
  console.log('[diagram] autoLayout:', nodes.length, 'nodes,', edges.length, 'edges');
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: state.direction || 'TB', nodesep: 100, ranksep: 90, marginx: 60, marginy: 60, align: 'DL' });
  g.setDefaultEdgeLabel(() => ({}));
  nodes.forEach(n => {
    const size = n.getSize();
    g.setNode(n.id, { width: size.width, height: size.height });
  });
  edges.forEach(e => {
    const src = e.getSourceCellId();
    const tgt = e.getTargetCellId();
    if (src && tgt) g.setEdge(src, tgt);
  });
  dagre.layout(g);
  const isVertical = (state.direction || 'TB') === 'TB' || state.direction === 'BT';

  // Post-layout: move decision branch targets to the SAME rank as their decision parent
  // This makes "格式正确? → 否 → 格式错误提示" appear at the same horizontal level
  const branchNodes = new Set();
  nodes.forEach(n => {
    if (n.getData()?.diagramType !== 'decision') return;
    const outEdges = graph.getOutgoingEdges(n) || [];
    if (outEdges.length < 2) return;
    const decPos = g.node(n.id);
    if (!decPos) return;
    // First outgoing edge = main flow (stays at dagre position), rest = branches
    for (let i = 1; i < outEdges.length; i++) {
      const tgtId = outEdges[i].getTargetCellId();
      const tgtPos = g.node(tgtId);
      if (!tgtPos) continue;
      if (isVertical) {
        tgtPos.y = decPos.y; // Same Y = same horizontal level
        // Push to the right of the decision, with gap
        if (tgtPos.x <= decPos.x) tgtPos.x = decPos.x + decPos.width + 120;
      } else {
        tgtPos.x = decPos.x;
        if (tgtPos.y <= decPos.y) tgtPos.y = decPos.y + decPos.height + 120;
      }
      branchNodes.add(tgtId);
    }
  });

  graph.startBatch('layout');
  nodes.forEach(n => {
    const pos = g.node(n.id);
    if (pos) n.position(pos.x - pos.width / 2, pos.y - pos.height / 2);
  });

  assignEdgePorts();

  graph.stopBatch('layout');
  setTimeout(() => fitView(), 100);
  // Save positions to server so refresh preserves layout
  saveNodePositions();
}

function assignEdgePorts() {
  const edges = graph.getEdges();
  const isVert = (state.direction || 'TB') === 'TB' || state.direction === 'BT';
  // Step 1: Assign ports based on relative node positions
  edges.forEach(e => {
    const srcNode = graph.getCellById(e.getSourceCellId());
    const tgtNode = graph.getCellById(e.getTargetCellId());
    if (!srcNode || !tgtNode) return;
    const sp = srcNode.getPosition(), ss = srcNode.getSize();
    const tp = tgtNode.getPosition(), ts = tgtNode.getSize();
    const scx = sp.x + ss.width / 2, scy = sp.y + ss.height / 2;
    const tcx = tp.x + ts.width / 2, tcy = tp.y + ts.height / 2;
    const dx = tcx - scx, dy = tcy - scy;
    let srcPort, tgtPort;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    const isBackEdge = isVert ? (dy < -30) : (dx < -30);
    if (isBackEdge) {
      if (isVert) { srcPort = 'pt'; tgtPort = dx > 0 ? 'pl' : 'pr'; }
      else { srcPort = 'pl'; tgtPort = dy > 0 ? 'pt' : 'pb'; }
    } else if (absDy < 20 && absDx > 30) {
      srcPort = dx > 0 ? 'pr' : 'pl'; tgtPort = dx > 0 ? 'pl' : 'pr';
    } else if (absDx < 20 && absDy > 30) {
      srcPort = dy > 0 ? 'pb' : 'pt'; tgtPort = dy > 0 ? 'pt' : 'pb';
    } else if (absDy > absDx) {
      srcPort = dy > 0 ? 'pb' : 'pt'; tgtPort = dy > 0 ? 'pt' : 'pb';
    } else {
      srcPort = dx > 0 ? 'pr' : 'pl'; tgtPort = dx > 0 ? 'pl' : 'pr';
    }
    e.prop('source/port', srcPort);
    e.prop('target/port', tgtPort);
  });
  // Step 2: Fix in/out conflicts — outgoing edge must not share port with incoming edge
  const altPorts = { pb: 'pr', pt: 'pl', pl: 'pb', pr: 'pt' };
  const nodePortUsage = {};
  edges.forEach(e => {
    const sId = e.getSourceCellId(), sPort = e.getSourcePortId();
    const tId = e.getTargetCellId(), tPort = e.getTargetPortId();
    if (sId && sPort) {
      const u = (nodePortUsage[sId] = nodePortUsage[sId] || {});
      (u[sPort] = u[sPort] || { in: false, out: false }).out = true;
    }
    if (tId && tPort) {
      const u = (nodePortUsage[tId] = nodePortUsage[tId] || {});
      (u[tPort] = u[tPort] || { in: false, out: false }).in = true;
    }
  });
  edges.forEach(e => {
    const sId = e.getSourceCellId(), sPort = e.getSourcePortId();
    if (!sId || !sPort) return;
    const usage = nodePortUsage[sId]?.[sPort];
    if (usage && usage.in && usage.out) {
      const alt = altPorts[sPort];
      if (alt) e.prop('source/port', alt);
    }
  });
}

function saveNodePositions() {
  if (!_sseSession) return;
  const positions = {};
  graph.getNodes().forEach(n => {
    const pos = n.getPosition();
    positions[n.id] = { x: Math.round(pos.x), y: Math.round(pos.y) };
  });
  fetch('/save-positions?s=' + _sseSession, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(positions),
  }).catch(() => {});
}

// ============================================================
// SSE Connection
// ============================================================
let _eventSource = null;
let _sseSession = null;
let _reconnectTimer = null;
let _stateRestored = false;

function connectSSE() {
  // Close existing connection first
  if (_eventSource) {
    _eventSource.close();
    _eventSource = null;
  }
  if (_reconnectTimer) {
    clearTimeout(_reconnectTimer);
    _reconnectTimer = null;
  }

  const params = new URLSearchParams(window.location.search);
  const session = params.get('s') || 'default';
  _sseSession = session;
  const statusEl = document.getElementById('status');
  console.log('[diagram] connecting SSE, session:', session);

  // Restore state (only on first connect or if graph is empty)
  if (!_stateRestored) {
    fetch('/state?s=' + session)
      .then(r => r.json())
      .then(cmds => {
        console.log('[diagram] restoring', cmds.length, 'commands');
        state._isRestoring = true;
        // Check if any node has saved positions (user has dragged before)
        const hasPositions = cmds.some(c => c.cmd === 'node' && c._x != null);
        cmds.forEach(cmd => handleCommand(cmd));
        state._isRestoring = false;
        _stateRestored = true;
        // Only auto-layout if no saved positions exist
        if (graph.getNodes().length > 0 && !hasPositions) autoLayout();
        else if (graph.getNodes().length > 0) { assignEdgePorts(); fitView(); }
      })
      .catch(err => console.error('[diagram] restore error:', err));
  }

  // SSE stream
  const es = new EventSource('/events?s=' + session);
  _eventSource = es;
  es.onopen = () => {
    statusEl.className = 'status connected';
    statusEl.textContent = '已连接';
    console.log('[diagram] SSE connected');
  };
  es.onerror = () => {
    statusEl.className = 'status disconnected';
    statusEl.textContent = '断开连接';
    es.close();
    _eventSource = null;
    // Only auto-reconnect if page is visible
    if (!document.hidden) {
      _reconnectTimer = setTimeout(() => connectSSE(), 2000);
    }
  };
  es.onmessage = (e) => {
    try {
      const cmd = JSON.parse(e.data);
      console.log('[diagram] SSE cmd:', cmd.cmd);
      handleCommand(cmd);
    } catch (err) { console.error('[diagram] SSE parse error:', err); }
  };
}

function disconnectSSE() {
  if (_eventSource) {
    _eventSource.close();
    _eventSource = null;
    console.log('[diagram] SSE disconnected (page hidden)');
  }
  if (_reconnectTimer) {
    clearTimeout(_reconnectTimer);
    _reconnectTimer = null;
  }
  const statusEl = document.getElementById('status');
  statusEl.className = 'status disconnected';
  statusEl.textContent = '后台暂停';
}

// ============================================================
// Cross-tab SSE coordination via BroadcastChannel
// Only the most recently active tab keeps its SSE connection.
// This ensures at most 1 SSE connection exists across all tabs,
// preventing browser's per-domain connection limit (6) from being exhausted.
// ============================================================
const _tabId = Math.random().toString(36).slice(2);
// GLOBAL channel across all sessions — ensures only 1 tab holds SSE at a time
const _bc = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('diagram-sse') : null;
let _hideTimer = null;

if (_bc) {
  _bc.onmessage = (e) => {
    if (e.data.type === 'claim-sse' && e.data.tabId !== _tabId) {
      // Another tab (any session) is claiming SSE, yield ours immediately
      disconnectSSE();
    }
  };
}

function claimSSE() {
  if (_bc) _bc.postMessage({ type: 'claim-sse', tabId: _tabId });
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    // This tab became visible — claim SSE, all other tabs yield
    if (_hideTimer) { clearTimeout(_hideTimer); _hideTimer = null; }
    claimSSE();
    if (!_eventSource) {
      _stateRestored = false;
      connectSSE();
    }
  } else {
    // Hidden — disconnect SSE after 5s to free connection slot.
    // Delay allows brief terminal switches (e.g. for export) to keep working.
    _hideTimer = setTimeout(() => { disconnectSSE(); _hideTimer = null; }, 5000);
  }
});

// ============================================================
// Handle SSE commands
// ============================================================
let layoutTimer = null;
function handleCommand(cmd) {
  try {
    switch (cmd.cmd) {
      case 'init':
        graph.clearCells();
        if (cmd.title) document.getElementById('diagramTitle').textContent = cmd.title;
        if (cmd.direction) state.direction = cmd.direction;
        break;
      case 'node': {
        const type = cmd.type || 'process';
        const existing = graph.getCellById(cmd.id);
        if (existing) {
          if (cmd.label) existing.attr('label/text', cmd.label);
          if (cmd._x != null) existing.position(cmd._x, cmd._y);
        } else {
          const nx = cmd._x != null ? cmd._x : (cmd.x || 0);
          const ny = cmd._x != null ? cmd._y : (cmd.y || 0);
          const config = buildNodeConfig(cmd.id, type, cmd.label || '', nx, ny);
          graph.addNode(config);
        }
        if (!state._isRestoring) debounceLayout();
        break;
      }
      case 'edge': {
        const edgeConfig = {
          source: cmd.from,
          target: cmd.to,
          attrs: { line: { stroke: cmd.color || '#8c8c8c', strokeWidth: 2, targetMarker: { name: 'classic', size: 8 } } },
        };
        if (cmd.label) {
          edgeConfig.labels = [{ attrs: { label: { text: cmd.label, fill: '#666', fontSize: 11 }, rect: { fill: '#f0f2f5', stroke: 'none' } } }];
        }
        graph.addEdge(edgeConfig);
        break;
      }
      case 'remove': {
        const cell = graph.getCellById(cmd.id);
        if (cell) graph.removeCell(cell);
        break;
      }
      case 'layout':
        autoLayout();
        break;
      case 'clear':
        graph.clearCells();
        break;
      case 'title':
        if (cmd.text) document.getElementById('diagramTitle').textContent = cmd.text;
        break;
      case 'batch':
        if (cmd.nodes) cmd.nodes.forEach(n => handleCommand({ cmd: 'node', ...n }));
        if (cmd.edges) cmd.edges.forEach(e => handleCommand({ cmd: 'edge', ...e }));
        autoLayout();
        break;
      case 'export':
        if (cmd.format === 'png') exportPNG(cmd);
        else if (cmd.format === 'svg') exportSVG();
        else if (cmd.format === 'drawio') drawioDownload();
        else exportJSON();
        break;
      case 'export-to-server':
        exportToServer(cmd.format, cmd.requestId, cmd);
        break;
    }
  } catch (err) {
    console.error('[diagram] handleCommand error:', cmd, err);
  }
}

function debounceLayout() {
  clearTimeout(layoutTimer);
  layoutTimer = setTimeout(() => autoLayout(), 300);
}

// ============================================================
// Export
// ============================================================
function _buildPngOptions(options = {}) {
  const ratio = Number(options.ratio);
  const padding = Number(options.padding);
  return {
    backgroundColor: options.backgroundColor || '#f0f2f5',
    padding: Number.isFinite(padding) && padding >= 0 ? padding : 20,
    ratio: Number.isFinite(ratio) && ratio > 0 ? ratio : PNG_EXPORT_DEFAULT_RATIO,
  };
}

function _exportPngWithCallback(options, callback) {
  // Save viewport, reset to 1:1 for correct export, then restore
  const currentZoom = graph.zoom();
  const currentTranslate = graph.translate();
  graph.zoomTo(1);
  graph.translate(0, 0);
  const exportOpts = _buildPngOptions(options);
  console.log('[diagram] PNG export options:', JSON.stringify(exportOpts));
  graph.toPNG((dataUri) => {
    graph.zoomTo(currentZoom);
    graph.translate(currentTranslate.tx, currentTranslate.ty);
    callback(dataUri);
  }, exportOpts);
}

function exportPNG(options = {}) {
  _exportPngWithCallback(options, (dataUri) => {
    const a = document.createElement('a'); a.download = 'diagram.png'; a.href = dataUri; a.click();
  });
}
function exportSVG() {
  graph.toSVG((svg) => {
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a'); a.download = 'diagram.svg'; a.href = URL.createObjectURL(blob); a.click();
  }, { padding: 20 });
}
function exportJSON() {
  const data = graph.toJSON();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.download = 'diagram.json'; a.href = URL.createObjectURL(blob); a.click();
}

function exportToServer(format, requestId, options = {}) {
  const sendResult = (data, error) => {
    fetch('/export-result', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId, data, error }),
    }).catch(err => console.error('[diagram] export-result POST failed:', err));
  };
  try {
    if (format === 'png') {
      _exportPngWithCallback(options, (dataUri) => { sendResult(dataUri, null); });
    } else if (format === 'svg') {
      graph.toSVG((svg) => { sendResult(svg, null); }, { padding: 20 });
    } else if (format === 'drawio') {
      const xml = generateDrawioXml();
      sendResult(xml || '', xml ? null : 'No nodes to export');
    } else {
      const data = JSON.stringify(graph.toJSON(), null, 2);
      sendResult(data, null);
    }
  } catch (err) {
    sendResult(null, err.message || 'Export failed');
  }
}

function generateDrawioXml() {
  const nodes = graph.getNodes();
  if (nodes.length === 0) return null;
  const drawioStyles = {
    'terminal': 'ellipse;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;',
    'terminal-end': 'ellipse;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;',
    'process': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;',
    'decision': 'rhombus;whiteSpace=wrap;html=1;fillColor=#fff2cc;strokeColor=#d6b656;',
    'service': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#e1d5e7;strokeColor=#9673a6;',
    'database': 'shape=cylinder3;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;',
    'success': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;',
    'error': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;',
  };
  let cellId = 2;
  const idMap = {};
  let cells = '';
  nodes.forEach(n => {
    const mid = cellId++;
    idMap[n.id] = mid;
    const type = n.getData()?.diagramType || 'process';
    const style = drawioStyles[type] || 'rounded=1;whiteSpace=wrap;html=1;';
    const pos = n.getPosition();
    const size = n.getSize();
    const label = escHtml(n.attr('label/text') || n.attr('text/text') || '');
    cells += `        <mxCell id="${mid}" value="${label}" style="${style}" vertex="1" parent="1"><mxGeometry x="${Math.round(pos.x)}" y="${Math.round(pos.y)}" width="${size.width}" height="${size.height}" as="geometry"/></mxCell>\n`;
  });
  graph.getEdges().forEach(e => {
    const mid = cellId++;
    const src = idMap[e.getSourceCellId()];
    const tgt = idMap[e.getTargetCellId()];
    if (!src || !tgt) return;
    const labels = e.getLabels();
    const lt = labels.length > 0 ? (labels[0].attrs?.label?.text || labels[0].attrs?.text?.text || '') : '';
    const la = lt ? ` value="${escHtml(lt)}"` : '';
    cells += `        <mxCell id="${mid}"${la} style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;" edge="1" source="${src}" target="${tgt}" parent="1"><mxGeometry relative="1" as="geometry"/></mxCell>\n`;
  });
  return `<?xml version="1.0" encoding="UTF-8"?>\n<mxfile><diagram name="Diagram"><mxGraphModel><root>\n        <mxCell id="0"/>\n        <mxCell id="1" parent="0"/>\n${cells}</root></mxGraphModel></diagram></mxfile>`;
}

function drawioDownload() {
  const xml = generateDrawioXml(); if (!xml) return;
  const blob = new Blob([xml], { type: 'application/xml' });
  const a = document.createElement('a'); a.download = 'diagram.drawio'; a.href = URL.createObjectURL(blob); a.click();
  closeDrawioMenu();
}
function drawioCopy() {
  const xml = generateDrawioXml(); if (!xml) return;
  navigator.clipboard.writeText(xml).then(() => showToast('已复制 XML 到剪贴板'));
  closeDrawioMenu();
}
function toggleDrawioMenu(e) { e.stopPropagation(); document.getElementById('drawioMenu').classList.toggle('show'); }
function closeDrawioMenu() { document.getElementById('drawioMenu').classList.remove('show'); }
document.addEventListener('click', (e) => { if (!e.target.closest('.dropdown')) closeDrawioMenu(); });

// ============================================================
// Util
// ============================================================
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showInlineEditor(title, value, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'inline-editor-overlay';
  overlay.innerHTML = '<div class="inline-editor"><label>' + escHtml(title) + '</label><input type="text" value="' + escHtml(value) + '"><div class="editor-btns"><button class="cancel">取消</button><button class="primary confirm">确定</button></div></div>';
  document.body.appendChild(overlay);
  const input = overlay.querySelector('input');
  input.focus();
  input.select();
  const close = () => { overlay.remove(); };
  const confirm = () => { onConfirm(input.value); close(); };
  overlay.querySelector('.cancel').onclick = close;
  overlay.querySelector('.confirm').onclick = confirm;
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirm(); else if (e.key === 'Escape') close(); });
  overlay.addEventListener('mousedown', (e) => { if (e.target === overlay) close(); });
}
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Boot
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  const missing = [];
  if (typeof X6 === 'undefined') missing.push('X6');
  if (typeof dagre === 'undefined') missing.push('dagre');
  if (missing.length > 0) {
    document.getElementById('container').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:#ff4d4f"><div style="font-size:18px;font-weight:600">依赖加载失败</div><div style="color:#8c8c8c;font-size:13px">无法加载: ' + missing.join(', ') + '。请检查网络连接后刷新页面。</div></div>';
    return;
  }
  console.log('[diagram] DOMContentLoaded');
  initGraph();
  setupNodePanel();
  connectSSE();
});
