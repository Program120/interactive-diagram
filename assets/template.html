<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Diagram</title>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh;width:100vw}

/* Toolbar */
.toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;padding:0 16px;z-index:100;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.toolbar .title{font-size:15px;font-weight:600;color:#1a1a1a;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar button{padding:6px 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#555;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.toolbar button:hover{border-color:#4096ff;color:#4096ff;background:#f0f5ff}
.toolbar .sep{width:1px;height:24px;background:#e8e8e8}

/* Status indicator */
.status{position:fixed;top:56px;right:16px;padding:4px 10px;border-radius:12px;font-size:11px;z-index:99;transition:all .3s}
.status.connected{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.status.disconnected{background:#fff2f0;color:#ff4d4f;border:1px solid #ffccc7}

/* Canvas */
.canvas{position:absolute;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
.canvas.panning{cursor:grabbing}
.canvas-inner{position:absolute;transform-origin:0 0;min-width:5000px;min-height:5000px}

/* SVG connections layer */
.connections{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* Nodes */
.node{position:absolute;z-index:2;cursor:move;transition:box-shadow .15s;user-select:none;opacity:0;animation:nodeIn .35s ease forwards}
.node:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)!important}
.node.dragging{z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.18)!important;transition:box-shadow .1s}
.node.no-animate{animation:none;opacity:1}
@keyframes nodeIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* Node types */
.node-process{background:#fff;border:2px solid #4096ff;border-radius:8px;padding:12px 20px;text-align:center;color:#1a1a1a;font-size:13px;min-width:100px}
.node-decision{background:#fff7e6;border:2px solid #faad14;padding:16px 24px;text-align:center;color:#1a1a1a;font-size:12px;line-height:1.3;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);min-width:130px;min-height:80px;display:flex;align-items:center;justify-content:center}
.node-terminal{background:linear-gradient(135deg,#52c41a,#73d13d);border:none;border-radius:24px;padding:10px 24px;text-align:center;color:#fff;font-size:13px;font-weight:500}
.node-terminal-end{background:linear-gradient(135deg,#ff4d4f,#ff7875);border:none;border-radius:24px;padding:10px 24px;text-align:center;color:#fff;font-size:13px;font-weight:500}
.node-service{background:#fff;border:2px solid #722ed1;border-radius:12px;padding:12px 20px;text-align:center;color:#1a1a1a;font-size:13px;min-width:100px}
.node-service .icon{font-size:20px;margin-bottom:4px}
.node-database{background:#fff;border:2px solid #13c2c2;border-radius:8px;padding:12px 20px;text-align:center;color:#1a1a1a;font-size:13px;min-width:100px;border-top-width:6px}
.node-success{background:#fff;border:2px solid #52c41a;border-radius:8px;padding:12px 20px;text-align:center;color:#1a1a1a;font-size:13px}
.node-error{background:#fff;border:2px solid #ff4d4f;border-radius:8px;padding:12px 20px;text-align:center;color:#1a1a1a;font-size:13px}
.node-group{border:2px dashed #d9d9d9;border-radius:12px;padding:32px 16px 16px;background:rgba(255,255,255,.5);min-width:200px;min-height:150px}
.node-group .group-title{position:absolute;top:8px;left:12px;font-size:11px;color:#8c8c8c;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* Edge labels (HTML div, rendered above nodes) */
.edge-labels-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
.edge-label-div{position:absolute;font-size:11px;color:#666;background:#f0f2f5;padding:1px 6px;border-radius:4px;white-space:nowrap;pointer-events:none;transform:translate(-50%,-50%)}

/* Zoom indicator */
.zoom-indicator{position:fixed;bottom:16px;right:16px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:4px 10px;font-size:11px;color:#8c8c8c;z-index:99}

/* Empty state */
.empty-state{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#bfbfbf;z-index:1}

/* Dropdown menu */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:200;min-width:140px;overflow:hidden}
.dropdown-menu.show{display:block}
.dropdown-menu button{display:block;width:100%;padding:8px 14px;border:none;background:none;text-align:left;font-size:12px;color:#555;cursor:pointer;white-space:nowrap}
.dropdown-menu button:hover{background:#f0f5ff;color:#4096ff}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 16px;border-radius:6px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state .text{font-size:14px}
.empty-state .sub{font-size:12px;margin-top:4px;color:#d9d9d9}
</style>
</head>
<body>

<div class="toolbar">
  <span class="title" id="diagramTitle">Interactive Diagram</span>
  <div class="sep"></div>
  <button onclick="zoomIn()">+ 放大</button>
  <button onclick="zoomOut()">- 缩小</button>
  <button onclick="resetView()">重置视图</button>
  <button onclick="fitView()">适应画布</button>
  <div class="sep"></div>
  <button onclick="exportPNG()">导出 PNG</button>
  <button onclick="exportSVG()">导出 SVG</button>
  <button onclick="exportJSON()">导出 JSON</button>
  <div class="dropdown">
    <button onclick="toggleDrawioMenu(event)">导出 Draw.io ▾</button>
    <div class="dropdown-menu" id="drawioMenu">
      <button onclick="drawioDownload()">下载文件</button>
      <button onclick="drawioCopy()">复制 XML</button>
    </div>
  </div>
</div>

<div class="status disconnected" id="status">断开连接</div>

<div class="canvas" id="canvas">
  <div class="canvas-inner" id="canvasInner">
    <svg class="connections" id="connections">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8c8c8c"/></marker>
        <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4096ff"/></marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#52c41a"/></marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4f"/></marker>
        <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#faad14"/></marker>
        <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#722ed1"/></marker>
      </defs>
    </svg>
    <div class="edge-labels-layer" id="edgeLabels"></div>
    <div class="empty-state" id="emptyState">
      <div class="icon">📊</div>
      <div class="text">等待图表数据...</div>
      <div class="sub">Agent 正在生成中，节点将逐个出现</div>
    </div>
  </div>
</div>

<div class="zoom-indicator" id="zoomIndicator">100%</div>

<script>
// ============================================================
// Diagram State
// ============================================================
const state = {
  nodes: {},     // id -> {id,label,type,x,y,width,height,icon,group}
  edges: [],     // [{from,to,label,color}]
  direction: 'TB',
  scale: 1,
  panX: 0,
  panY: 0,
  _layoutTimer: null,
  _connTimer: null,
  _isRestoring: false  // true during state restoration
};

// DOM refs
const canvas = document.getElementById('canvas');
const inner = document.getElementById('canvasInner');
const connSvg = document.getElementById('connections');
const emptyState = document.getElementById('emptyState');
const statusEl = document.getElementById('status');
const zoomEl = document.getElementById('zoomIndicator');
const titleEl = document.getElementById('diagramTitle');
const edgeLabelsEl = document.getElementById('edgeLabels');

// ============================================================
// Session ID from URL: ?s=mydiagram (default: "default")
// ============================================================
const sessionId = new URLSearchParams(window.location.search).get('s') || 'default';
const sessionParam = sessionId !== 'default' ? `?s=${encodeURIComponent(sessionId)}` : '';

// Show session name in title if not default
if (sessionId !== 'default') {
  titleEl.textContent = `[${sessionId}] Interactive Diagram`;
}

// ============================================================
// SSE Connection with State Recovery
// ============================================================
let evtSource = null;
let sseReconnectTimer = null;

async function connectSSE() {
  // Step 1: Fetch existing state for refresh recovery
  try {
    const res = await fetch('/state' + sessionParam);
    if (res.ok) {
      const commands = await res.json();
      if (commands.length > 0) {
        state._isRestoring = true;
        commands.forEach(cmd => handleCommand(cmd));
        state._isRestoring = false;
        // Run layout once after all commands replayed
        runLayout(true); // true = immediate, skip debounce
      }
    }
  } catch (e) {
    console.log('No prior state to restore');
  }

  // Step 2: Connect SSE for incremental updates (session-scoped)
  if (evtSource) { evtSource.close(); }
  evtSource = new EventSource('/events' + sessionParam);
  evtSource.onopen = () => {
    statusEl.className = 'status connected';
    statusEl.textContent = '已连接';
    if (sseReconnectTimer) { clearTimeout(sseReconnectTimer); sseReconnectTimer = null; }
  };
  evtSource.onerror = () => {
    statusEl.className = 'status disconnected';
    statusEl.textContent = '断开连接';
    evtSource.close();
    sseReconnectTimer = setTimeout(connectSSE, 2000);
  };
  evtSource.onmessage = (e) => {
    try {
      const cmd = JSON.parse(e.data);
      handleCommand(cmd);
    } catch (err) { console.error('Invalid command:', e.data, err); }
  };
}

connectSSE();

// ============================================================
// Command Handler
// ============================================================
function handleCommand(cmd) {
  switch (cmd.cmd) {
    case 'init':
      clearDiagram();
      if (cmd.title) titleEl.textContent = cmd.title;
      if (cmd.direction) state.direction = cmd.direction;
      break;
    case 'node':
      addNode(cmd);
      break;
    case 'edge':
      addEdge(cmd);
      break;
    case 'layout':
      if (!state._isRestoring) runLayout();
      break;
    case 'clear':
      clearDiagram();
      break;
    case 'title':
      titleEl.textContent = cmd.text || 'Interactive Diagram';
      break;
    case 'batch':
      if (cmd.nodes) cmd.nodes.forEach(n => addNode(n));
      if (cmd.edges) cmd.edges.forEach(e => addEdge(e));
      if (!state._isRestoring) runLayout();
      break;
    case 'remove':
      removeNode(cmd.id);
      break;
    case 'export':
      if (cmd.format === 'png') exportPNG();
      else if (cmd.format === 'svg') exportSVG();
      else if (cmd.format === 'drawio') exportDrawio();
      else exportJSON();
      break;
  }
}

// ============================================================
// Node Management
// ============================================================
function addNode(cmd) {
  emptyState.style.display = 'none';
  const id = cmd.id;
  if (state.nodes[id]) {
    Object.assign(state.nodes[id], cmd);
    updateNodeDOM(id);
    return;
  }
  state.nodes[id] = {
    id,
    label: cmd.label || id,
    type: cmd.type || 'process',
    x: 0, y: 0,
    width: 0, height: 0,
    icon: cmd.icon || '',
    group: cmd.group || ''
  };
  createNodeDOM(id);
  // Auto-layout after adding node (debounced), skip during restore
  if (!state._isRestoring) {
    clearTimeout(state._layoutTimer);
    state._layoutTimer = setTimeout(() => runLayout(), 150);
  }
}

function createNodeDOM(id) {
  const nd = state.nodes[id];
  const el = document.createElement('div');
  el.className = 'node';
  if (state._isRestoring) el.classList.add('no-animate');
  el.id = 'node-' + id;
  el.dataset.nodeId = id;

  switch (nd.type) {
    case 'terminal':
      el.classList.add('node-terminal');
      el.textContent = nd.label;
      break;
    case 'terminal-end':
      el.classList.add('node-terminal-end');
      el.textContent = nd.label;
      break;
    case 'process':
      el.classList.add('node-process');
      el.textContent = nd.label;
      break;
    case 'decision':
      el.classList.add('node-decision');
      el.textContent = nd.label;
      break;
    case 'service':
      el.classList.add('node-service');
      el.innerHTML = (nd.icon ? '<div class="icon">' + escHtml(nd.icon) + '</div>' : '') + escHtml(nd.label);
      break;
    case 'database':
      el.classList.add('node-database');
      el.textContent = nd.label;
      break;
    case 'success':
      el.classList.add('node-success');
      el.textContent = nd.label;
      break;
    case 'error':
      el.classList.add('node-error');
      el.textContent = nd.label;
      break;
    case 'group':
      el.classList.add('node-group');
      el.innerHTML = '<div class="group-title">' + escHtml(nd.label) + '</div>';
      break;
    default:
      el.classList.add('node-process');
      el.textContent = nd.label;
  }

  inner.appendChild(el);
  // Measure size synchronously by forcing layout
  const rect = el.getBoundingClientRect();
  nd.width = rect.width / state.scale;
  nd.height = rect.height / state.scale;
  // For decision nodes (diamond), make layout use larger bounding box
  if (nd.type === 'decision') {
    nd.width = Math.max(nd.width, 130);
    nd.height = Math.max(nd.height, 80);
  }

  setupDrag(el, id);
}

function updateNodeDOM(id) {
  const el = document.getElementById('node-' + id);
  const nd = state.nodes[id];
  if (!el || !nd) return;
  el.textContent = nd.label;
}

function removeNode(id) {
  const el = document.getElementById('node-' + id);
  if (el) el.remove();
  delete state.nodes[id];
  state.edges = state.edges.filter(e => e.from !== id && e.to !== id);
  renderConnections();
}

// ============================================================
// Edge Management
// ============================================================
function addEdge(cmd) {
  // Avoid duplicate edges
  const exists = state.edges.some(e => e.from === cmd.from && e.to === cmd.to);
  if (exists) return;
  state.edges.push({ from: cmd.from, to: cmd.to, label: cmd.label || '', color: cmd.color || '' });
  if (!state._isRestoring) {
    clearTimeout(state._connTimer);
    state._connTimer = setTimeout(() => renderConnections(), 50);
  }
}

// ============================================================
// Dagre Layout (using real dagre.js from CDN)
// ============================================================
function runLayout(immediate) {
  if (typeof dagre === 'undefined') {
    console.warn('dagre.js not loaded, skipping layout');
    renderConnections();
    return;
  }

  const nodeIds = Object.keys(state.nodes);
  if (nodeIds.length === 0) return;

  const g = new dagre.graphlib.Graph();
  g.setGraph({
    rankdir: state.direction || 'TB',
    nodesep: 80,
    ranksep: 100,
    marginx: 60,
    marginy: 60,
    edgesep: 30
  });
  g.setDefaultEdgeLabel(() => ({}));

  // Add nodes with measured dimensions
  nodeIds.forEach(id => {
    const nd = state.nodes[id];
    g.setNode(id, {
      width: nd.width || 120,
      height: nd.height || 60
    });
  });

  // Add edges
  state.edges.forEach(e => {
    if (state.nodes[e.from] && state.nodes[e.to]) {
      g.setEdge(e.from, e.to);
    }
  });

  // Run dagre layout
  dagre.layout(g);

  // Apply positions - dagre returns CENTER coordinates, convert to top-left
  nodeIds.forEach(id => {
    const pos = g.node(id);
    const nd = state.nodes[id];
    if (!nd || !pos) return;
    // Convert center to top-left
    nd.x = pos.x - (nd.width || 120) / 2;
    nd.y = pos.y - (nd.height || 60) / 2;
    const el = document.getElementById('node-' + id);
    if (el) {
      if (state._isRestoring || immediate) {
        // No animation during restore
        el.style.left = nd.x + 'px';
        el.style.top = nd.y + 'px';
      } else {
        el.style.transition = 'left .4s ease, top .4s ease';
        el.style.left = nd.x + 'px';
        el.style.top = nd.y + 'px';
        setTimeout(() => { el.style.transition = 'box-shadow .15s'; }, 450);
      }
    }
  });

  // Render connections after positions are set
  if (state._isRestoring || immediate) {
    requestAnimationFrame(() => {
      renderConnections();
      fitView();
    });
  } else {
    setTimeout(() => renderConnections(), 60);
    setTimeout(() => fitView(), 500);
  }
}

// ============================================================
// Connection Rendering
// ============================================================
function renderConnections() {
  // Remove old SVG paths (keep defs)
  connSvg.querySelectorAll('path').forEach(el => el.remove());
  // Remove old HTML edge labels
  edgeLabelsEl.innerHTML = '';

  state.edges.forEach(edge => {
    const src = state.nodes[edge.from];
    const tgt = state.nodes[edge.to];
    if (!src || !tgt) return;

    // Calculate node centers
    const sx = src.x + (src.width || 120) / 2;
    const sy = src.y + (src.height || 60) / 2;
    const tx = tgt.x + (tgt.width || 120) / 2;
    const ty = tgt.y + (tgt.height || 60) / 2;

    // Find edge points on node boundaries
    const sp = edgePoint(src, tx, ty);
    const tp = edgePoint(tgt, sx, sy);

    // Bezier control points
    const dx = tp.x - sp.x;
    const dy = tp.y - sp.y;
    let cx1, cy1, cx2, cy2;
    const isVertical = state.direction === 'TB' || state.direction === 'BT';
    if (isVertical) {
      cx1 = sp.x; cy1 = sp.y + dy * 0.5;
      cx2 = tp.x; cy2 = tp.y - dy * 0.5;
    } else {
      cx1 = sp.x + dx * 0.5; cy1 = sp.y;
      cx2 = tp.x - dx * 0.5; cy2 = tp.y;
    }

    const markerColor = edge.color ? 'url(#arrow-' + edge.color + ')' : 'url(#arrowhead)';
    const strokeColor = edge.color ? getColor(edge.color) : '#8c8c8c';

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${sp.x} ${sp.y} C${cx1} ${cy1}, ${cx2} ${cy2}, ${tp.x} ${tp.y}`);
    path.setAttribute('stroke', strokeColor);
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', markerColor);
    connSvg.appendChild(path);

    // Edge label as HTML div (z-index 3, above nodes)
    if (edge.label) {
      const mx = (sp.x + tp.x) / 2;
      const my = (sp.y + tp.y) / 2;
      const labelDiv = document.createElement('div');
      labelDiv.className = 'edge-label-div';
      labelDiv.textContent = edge.label;
      labelDiv.style.left = mx + 'px';
      labelDiv.style.top = my + 'px';
      edgeLabelsEl.appendChild(labelDiv);
    }
  });
}

function edgePoint(node, targetX, targetY) {
  const cx = node.x + (node.width || 120) / 2;
  const cy = node.y + (node.height || 60) / 2;
  const w = (node.width || 120) / 2 + 4;
  const h = (node.height || 60) / 2 + 4;

  if (node.type === 'decision') {
    // Diamond shape — clip-path polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)
    const dw = (node.width || 130) / 2 + 4;
    const dh = (node.height || 80) / 2 + 4;
    const dx = targetX - cx, dy = targetY - cy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx === 0 && ady === 0) return { x: cx, y: cy - dh };
    if (adx * dh > ady * dw) {
      const s = dx > 0 ? 1 : -1;
      return { x: cx + s * dw, y: cy + (adx > 0 ? dy * (dw / adx) : 0) };
    } else {
      const s = dy > 0 ? 1 : -1;
      return { x: cx + (ady > 0 ? dx * (dh / ady) : 0), y: cy + s * dh };
    }
  }

  // Rectangle intersection
  const dx = targetX - cx, dy = targetY - cy;
  if (dx === 0 && dy === 0) return { x: cx, y: cy - h };
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx * h > ady * w) {
    const s = dx > 0 ? 1 : -1;
    return { x: cx + s * w, y: cy + (adx > 0 ? dy * (w / adx) : 0) };
  } else {
    const s = dy > 0 ? 1 : -1;
    return { x: cx + (ady > 0 ? dx * (h / ady) : 0), y: cy + s * h };
  }
}

function getColor(c) {
  const m = { 'blue': '#4096ff', 'green': '#52c41a', 'red': '#ff4d4f', 'purple': '#722ed1', 'cyan': '#13c2c2', 'orange': '#faad14' };
  return m[c] || c || '#8c8c8c';
}

// ============================================================
// Drag System
// ============================================================
let dragState = null;
function setupDrag(el, id) {
  const start = (ex, ey) => {
    el.classList.add('dragging');
    const nd = state.nodes[id];
    dragState = { id, offsetX: ex / state.scale - nd.x, offsetY: ey / state.scale - nd.y };
  };
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    const rect = inner.getBoundingClientRect();
    start(e.clientX - rect.left, e.clientY - rect.top);
  });
  el.addEventListener('touchstart', (e) => {
    e.stopPropagation();
    const t = e.touches[0];
    const rect = inner.getBoundingClientRect();
    start(t.clientX - rect.left, t.clientY - rect.top);
  }, { passive: true });
}

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const rect = inner.getBoundingClientRect();
  const nd = state.nodes[dragState.id];
  nd.x = (e.clientX - rect.left) / state.scale - dragState.offsetX;
  nd.y = (e.clientY - rect.top) / state.scale - dragState.offsetY;
  const el = document.getElementById('node-' + dragState.id);
  if (el) { el.style.left = nd.x + 'px'; el.style.top = nd.y + 'px'; }
  renderConnections();
});
document.addEventListener('mouseup', () => {
  if (dragState) {
    const el = document.getElementById('node-' + dragState.id);
    if (el) el.classList.remove('dragging');
    dragState = null;
  }
});
document.addEventListener('touchmove', (e) => {
  if (!dragState) return;
  const t = e.touches[0];
  const rect = inner.getBoundingClientRect();
  const nd = state.nodes[dragState.id];
  nd.x = (t.clientX - rect.left) / state.scale - dragState.offsetX;
  nd.y = (t.clientY - rect.top) / state.scale - dragState.offsetY;
  const el = document.getElementById('node-' + dragState.id);
  if (el) { el.style.left = nd.x + 'px'; el.style.top = nd.y + 'px'; }
  renderConnections();
}, { passive: true });
document.addEventListener('touchend', () => {
  if (dragState) {
    const el = document.getElementById('node-' + dragState.id);
    if (el) el.classList.remove('dragging');
    dragState = null;
  }
});

// ============================================================
// Pan (drag canvas, NO scroll zoom)
// ============================================================
let panState = null;
canvas.addEventListener('mousedown', (e) => {
  if (dragState) return;
  if (e.target !== canvas && e.target !== inner && !e.target.classList.contains('connections')) return;
  canvas.classList.add('panning');
  panState = { startX: e.clientX - state.panX, startY: e.clientY - state.panY };
});
document.addEventListener('mousemove', (e) => {
  if (!panState) return;
  state.panX = e.clientX - panState.startX;
  state.panY = e.clientY - panState.startY;
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (panState) { canvas.classList.remove('panning'); panState = null; }
});

function applyTransform() {
  inner.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.scale})`;
  zoomEl.textContent = Math.round(state.scale * 100) + '%';
}

// ============================================================
// Zoom (buttons + Ctrl/Cmd+wheel + trackpad pinch)
// ============================================================
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldScale = state.scale;
  // trackpad pinch sends ctrlKey + small deltaY; mouse wheel sends larger deltaY
  // Normalize: clamp effective delta to smooth out big wheel jumps
  const raw = e.ctrlKey ? e.deltaY * 3 : e.deltaY;
  const clamped = Math.max(-30, Math.min(30, raw));
  const factor = 1 - clamped * 0.008;
  state.scale = Math.min(3, Math.max(0.2, oldScale * factor));
  const ratio = state.scale / oldScale;
  state.panX = mx - ratio * (mx - state.panX);
  state.panY = my - ratio * (my - state.panY);
  applyTransform();
}, { passive: false });
function zoomIn() { state.scale = Math.min(3, state.scale * 1.15); applyTransform(); }
function zoomOut() { state.scale = Math.max(0.2, state.scale / 1.15); applyTransform(); }
function resetView() { state.scale = 1; state.panX = 0; state.panY = 0; applyTransform(); }

function fitView() {
  const nodes = Object.values(state.nodes);
  if (nodes.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + (n.width || 120));
    maxY = Math.max(maxY, n.y + (n.height || 60));
  });
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;
  const gw = maxX - minX + 120;
  const gh = maxY - minY + 120;
  const s = Math.min(cw / gw, ch / gh, 1.5);
  state.scale = Math.max(0.3, Math.min(s, 1.5));
  state.panX = (cw - gw * state.scale) / 2 - minX * state.scale + 60 * state.scale;
  state.panY = (ch - gh * state.scale) / 2 - minY * state.scale + 60 * state.scale;
  applyTransform();
}

// ============================================================
// Clear
// ============================================================
function clearDiagram() {
  Object.keys(state.nodes).forEach(id => {
    const el = document.getElementById('node-' + id);
    if (el) el.remove();
  });
  state.nodes = {};
  state.edges = [];
  renderConnections();
  edgeLabelsEl.innerHTML = '';
  emptyState.style.display = '';
  resetView();
}

// ============================================================
// Export
// ============================================================
function exportPNG() {
  const nodes = Object.values(state.nodes);
  if (nodes.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => { minX = Math.min(minX, n.x - 10); minY = Math.min(minY, n.y - 10); maxX = Math.max(maxX, n.x + (n.width || 120) + 10); maxY = Math.max(maxY, n.y + (n.height || 60) + 10); });
  const w = maxX - minX + 40; const h = maxY - minY + 40;
  const c = document.createElement('canvas');
  c.width = w * 2; c.height = h * 2;
  const ctx = c.getContext('2d');
  ctx.scale(2, 2); ctx.fillStyle = '#f0f2f5'; ctx.fillRect(0, 0, w, h);
  const clone = inner.cloneNode(true);
  clone.querySelector('.empty-state')?.remove();
  clone.style.transform = `translate(${-minX + 20}px,${-minY + 20}px)`;
  const data = new XMLSerializer().serializeToString(clone);
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = `<svg xmlns="${svgNS}" width="${w}" height="${h}"><foreignObject width="${w}" height="${h}"><div xmlns="http://www.w3.org/1999/xhtml">${data}</div></foreignObject></svg>`;
  const img = new Image();
  img.onload = () => { ctx.drawImage(img, 0, 0); const a = document.createElement('a'); a.download = 'diagram.png'; a.href = c.toDataURL('image/png'); a.click(); };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function exportSVG() {
  const clone = connSvg.cloneNode(true);
  const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type: 'image/svg+xml' });
  const a = document.createElement('a'); a.download = 'diagram.svg'; a.href = URL.createObjectURL(blob); a.click();
}

function exportJSON() {
  const data = { nodes: Object.values(state.nodes), edges: state.edges, direction: state.direction };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.download = 'diagram.json'; a.href = URL.createObjectURL(blob); a.click();
}

function generateDrawioXml() {
  const nodes = Object.values(state.nodes);
  if (nodes.length === 0) return null;
  const styleMap = {
    'terminal': 'ellipse;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;',
    'terminal-end': 'ellipse;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;',
    'process': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;',
    'decision': 'rhombus;whiteSpace=wrap;html=1;fillColor=#fff2cc;strokeColor=#d6b656;',
    'service': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#e1d5e7;strokeColor=#9673a6;',
    'database': 'shape=cylinder3;whiteSpace=wrap;html=1;boundedLbl=1;backgroundOutline=1;size=15;fillColor=#d5e8d4;strokeColor=#82b366;',
    'success': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;',
    'error': 'rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;',
    'group': 'rounded=1;whiteSpace=wrap;html=1;dashed=1;fillColor=none;strokeColor=#666666;',
  };
  const defaultStyle = 'rounded=1;whiteSpace=wrap;html=1;';
  let cellId = 2;
  const nodeIdMap = {};
  let cells = '';
  nodes.forEach(n => {
    const mid = cellId++;
    nodeIdMap[n.id] = mid;
    const style = styleMap[n.type] || defaultStyle;
    const w = n.width || 120;
    const h = n.height || 60;
    const label = escHtml(n.label || '');
    cells += `        <mxCell id="${mid}" value="${label}" style="${style}" vertex="1" parent="1">\n          <mxGeometry x="${Math.round(n.x)}" y="${Math.round(n.y)}" width="${w}" height="${h}" as="geometry" />\n        </mxCell>\n`;
  });
  state.edges.forEach(e => {
    const mid = cellId++;
    const src = nodeIdMap[e.from];
    const tgt = nodeIdMap[e.to];
    if (src === undefined || tgt === undefined) return;
    const label = e.label ? ` value="${escHtml(e.label)}"` : '';
    let style = 'edgeStyle=orthogonalEdgeStyle;rounded=1;orthogonalLoop=1;jettySize=auto;html=1;';
    if (e.color) style += `strokeColor=${e.color};`;
    cells += `        <mxCell id="${mid}"${label} style="${style}" edge="1" source="${src}" target="${tgt}" parent="1">\n          <mxGeometry relative="1" as="geometry" />\n        </mxCell>\n`;
  });
  return `<?xml version="1.0" encoding="UTF-8"?>
<mxfile>
  <diagram name="Diagram">
    <mxGraphModel>
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
${cells}      </root>
    </mxGraphModel>
  </diagram>
</mxfile>`;
}

function exportDrawio() { drawioDownload(); }

function drawioDownload() {
  const xml = generateDrawioXml();
  if (!xml) return;
  const blob = new Blob([xml], { type: 'application/xml' });
  const a = document.createElement('a'); a.download = 'diagram.drawio'; a.href = URL.createObjectURL(blob); a.click();
  closeDrawioMenu();
}

function drawioCopy() {
  const xml = generateDrawioXml();
  if (!xml) return;
  navigator.clipboard.writeText(xml).then(() => showToast('已复制 XML 到剪贴板'));
  closeDrawioMenu();
}

function toggleDrawioMenu(e) {
  e.stopPropagation();
  document.getElementById('drawioMenu').classList.toggle('show');
}

function closeDrawioMenu() {
  document.getElementById('drawioMenu').classList.remove('show');
}

document.addEventListener('click', closeDrawioMenu);

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ============================================================
// Util
// ============================================================
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
